<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Consent Chat</title>
    <style>
        #chat-box { width: 500px; height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; }
        .message { margin: 5px 0; padding: 5px; border-radius: 4px; }
        .green { background-color: #d4edda; }
        .yellow { background-color: #fff3cd; }
        .red { background-color: #f8d7da; }
    </style>
</head>
<body>
    <h1>Consent Chat</h1>
    <div id="chat-box"></div>
    <input type="text" id="message-input" placeholder="Type your message..." style="width:400px;">
    <button onclick="sendMessage()">Send</button>

    <script>
        function sendMessage() {
            const input = document.getElementById("message-input");
            const message = input.value;
            if (!message) return;

            fetch("/send_message", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            })
            .then(res => res.json())
            .then(data => {
                if (data.sensitivity === "red") {
                    if (!confirm("Sensitive information detected! Do you allow sharing?")) {
                        input.value = "";
                        return;
                    }
                }
                const chatBox = document.getElementById("chat-box");
                const msgDiv = document.createElement("div");
                msgDiv.className = `message ${data.sensitivity}`;
                msgDiv.textContent = data.message;
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
                input.value = "";
            });
        }
    </script>
</body>
</html>
